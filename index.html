// ── AUTH SYSTEM ──────────────────────────────────────────────────────────
// Usuarios definidos en sigsa_scraper.py → USUARIOS
// Para agregar usuarios: editar USUARIOS en el script y volver a correr
const USUARIOS = {};

function hashStr(s) { let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0; return String(h); }

function getUsuarios() {
  // Combina usuarios hardcodeados con cambios de contraseña guardados localmente
  const base = {};
  for(const [email,u] of Object.entries(USUARIOS)) {
    base[email] = {passHash: hashStr(u.pass), nombre: u.nombre, mustChange: u.mustChange};
  }
  // Aplicar cambios locales de contraseña (cuando el usuario cambia su pass)
  try {
    const local = JSON.parse(localStorage.getItem("dw_pass_changes")||"{}");
    for(const [email,v] of Object.entries(local)) {
      if(base[email]) base[email] = {...base[email], ...v};
    }
  } catch(e) {}
  return base;
}

function savePassChange(email, passHash) {
  try {
    const local = JSON.parse(localStorage.getItem("dw_pass_changes")||"{}");
    local[email] = {passHash, mustChange: false};
    localStorage.setItem("dw_pass_changes", JSON.stringify(local));
  } catch(e) {}
}

function getSession() {
  try { const s=JSON.parse(localStorage.getItem("dw_session")||"null"); if(s&&s.exp>Date.now()) return s; } catch(e) {} return null;
}
function setSession(email,nombre) { localStorage.setItem("dw_session",JSON.stringify({email,nombre,exp:Date.now()+8*3600*1000})); }
function clearSession() { localStorage.removeItem("dw_session"); }

function CambiarPassword({email,nombre,onDone}) {
  const [nueva,setNueva]=useState(""); const [conf,setConf]=useState(""); const [error,setError]=useState("");
  function go() {
    setError("");
    if(nueva.length<6){setError("Mínimo 6 caracteres.");return;}
    if(nueva!==conf){setError("Las contraseñas no coinciden.");return;}
    if(nueva==="36604114"){setError("No podés usar el DNI como contraseña nueva.");return;}
    savePassChange(email, hashStr(nueva)); setSession(email,nombre); onDone(nombre);
  }
  const inp=(v,sv,ph)=>h("input",{type:"password",value:v,onChange:e=>sv(e.target.value),placeholder:ph,style:{width:"100%",background:"#0f0f0a",border:"1px solid #2d2a1e",borderRadius:7,padding:"10px 14px",color:"#f0ebe0",fontSize:13,outline:"none",marginBottom:14}});
  const lbl=t=>h("label",{style:{fontSize:10,color:"#6b6452",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:6}},t);
  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0a0a08,#111109)"}},
    h("div",{style:{width:380,background:"#141410",border:"1px solid #c9a84c44",borderTop:"3px solid #c9a84c",borderRadius:14,padding:"40px 36px",boxShadow:"0 8px 40px #00000088"}},
      h("div",{style:{marginBottom:24}},
        h("div",{style:{fontSize:18,fontWeight:700,color:"#f0ebe0",marginBottom:6}},"Primer ingreso — Hola "+nombre+" 👋"),
        h("div",{style:{fontSize:12,color:"#8b7d6b",lineHeight:1.6}},"Por seguridad establecé una contraseña personal antes de continuar.")
      ),
      lbl("Nueva contraseña"), inp(nueva,setNueva,"Mínimo 6 caracteres"),
      lbl("Confirmar"), inp(conf,setConf,"Repetí la contraseña"),
      error&&h("div",{style:{background:"#2a0a0a",border:"1px solid #7f1d1d",borderRadius:6,padding:"8px 12px",color:"#f87171",fontSize:12,marginBottom:14}},"⚠ "+error),
      h("button",{onClick:go,style:{width:"100%",background:"#c9a84c",color:"#0a0a08",border:"none",borderRadius:7,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:1}},"Guardar y continuar →")
    )
  );
}

// ── PANEL ADMIN ──────────────────────────────────────────────────────────
const ADMIN_EMAIL = "leoqui1991@gmail.com"; // único que puede ver el panel admin

function PanelAdmin({onClose}) {
  const [usuarios, setUsuarios] = useState({});
  const [newEmail, setNewEmail] = useState("");
  const [newNombre, setNewNombre] = useState("");
  const [newPass, setNewPass] = useState("");
  const [msg, setMsg] = useState("");

  function reload() { setUsuarios(getUsuarios()); }
  React.useEffect(()=>{ reload(); },[]);

  function resetPass(email) {
    const nueva=prompt("Nueva contraseña para "+email+" (mín. 6 caracteres):");
    if(!nueva||nueva.length<6){setMsg("Contraseña muy corta.");return;}
    savePassChange(email, hashStr(nueva));
    setMsg("✓ Contraseña reseteada. El usuario verá el cambio en su próximo login.");
    reload();
  }

  function agregar() {
    setMsg("Para agregar usuarios: editá USUARIOS en sigsa_scraper.py y volvé a correr el script. ¡Es muy fácil!");
  }

  function eliminar(email) {
    setMsg("Para eliminar usuarios: removelos de USUARIOS en sigsa_scraper.py y volvé a correr el script.");
  }

  const inp = (v, sv, t, ph) => h("input", {
    type: t, value: v, onChange: e => sv(e.target.value), placeholder: ph,
    style: { background:"#0f0f0a", border:"1px solid #2d2a1e", borderRadius:6,
      padding:"8px 12px", color:"#f0ebe0", fontSize:12, outline:"none", width:"100%" }
  });

  return h("div", { style: { position:"fixed", inset:0, background:"#000000cc", zIndex:1000,
    display:"flex", alignItems:"center", justifyContent:"center" } },
    h("div", { style: { width:560, maxHeight:"85vh", overflowY:"auto", background:"#141410",
      border:"1px solid #c9a84c44", borderTop:"3px solid #c9a84c",
      borderRadius:14, padding:"28px 32px" } },

      // Header
      h("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 } },
        h("div", { style: { fontSize:16, fontWeight:700, color:"#f0ebe0" } }, "👤 Gestión de Usuarios"),
        h("button", { onClick: onClose, style: { background:"none", border:"1px solid #2d2a1e",
          color:"#6b6452", borderRadius:6, padding:"4px 12px", cursor:"pointer", fontSize:12 } }, "Cerrar")
      ),

      // Lista de usuarios
      h("div", { style: { marginBottom:24 } },
        h("div", { style: { fontSize:10, color:"#4a4335", letterSpacing:2, textTransform:"uppercase", marginBottom:12 } },
          "Usuarios con acceso (" + Object.keys(usuarios).length + ")"),
        Object.entries(usuarios).map(([email, u]) =>
          h("div", { key: email, style: { display:"flex", alignItems:"center", justifyContent:"space-between",
            background:"#0f0f0a", border:"1px solid #2d2a1e", borderRadius:8,
            padding:"10px 14px", marginBottom:8 } },
            h("div", null,
              h("div", { style: { color:"#d4c9b0", fontWeight:600, fontSize:13 } }, u.nombre),
              h("div", { style: { color:"#4a4335", fontSize:11, fontFamily:"monospace" } }, email),
              u.mustChange && h("span", { style: { background:"#1a1a0a", color:"#fbbf24",
                border:"1px solid #854d0e", borderRadius:4, padding:"1px 6px",
                fontSize:9, marginTop:4, display:"inline-block" } }, "⏳ Debe cambiar contraseña")
            ),
            h("div", { style: { display:"flex", gap:8 } },
              h("button", { onClick: ()=>resetPass(email),
                style: { background:"#1a1a0a", border:"1px solid #2d2a1e", color:"#c9a84c",
                  borderRadius:5, padding:"4px 10px", cursor:"pointer", fontSize:11 } }, "Reset pass"),
              email !== ADMIN_EMAIL && h("button", { onClick: ()=>eliminar(email),
                style: { background:"#2a0a0a", border:"1px solid #7f1d1d", color:"#f87171",
                  borderRadius:5, padding:"4px 10px", cursor:"pointer", fontSize:11 } }, "Eliminar")
            )
          )
        )
      ),

      // Agregar usuario
      h("div", { style: { background:"#0f0f0a", border:"1px solid #2d2a1e", borderRadius:10, padding:"16px" } },
        h("div", { style: { fontSize:10, color:"#4a4335", letterSpacing:2, textTransform:"uppercase", marginBottom:14 } },
          "Agregar nuevo usuario"),
        h("div", { style: { display:"flex", flexDirection:"column", gap:8 } },
          inp(newNombre, setNewNombre, "text", "Nombre (ej: Fernando)"),
          inp(newEmail, setNewEmail, "text", "Email"),
          inp(newPass, setNewPass, "password", "Contraseña inicial (mín. 6 caracteres)"),
          h("button", { onClick: agregar,
            style: { background:"#c9a84c", color:"#0a0a08", border:"none", borderRadius:7,
              padding:"10px", fontSize:12, fontWeight:700, cursor:"pointer", letterSpacing:1 } },
            "➕ Agregar usuario")
        )

      // Mensaje
      msg && h("div", { style: { marginTop:14, padding:"10px 14px", borderRadius:7,
        background: msg.startsWith("✓") ? "#0f2a1a" : "#2a0a0a",

        color: msg.startsWith("✓") ? "#4ade80" : "#f87171", fontSize:12 } }, msg)
    )
  );
}

function AppConLogin() {
  const [screen, setScreen] = useState(()=>getSession()?"app":"login");
  const [usuario, setUsuario] = useState(()=>{ const s=getSession(); return s?s.nombre:""; });
  const [userEmail, setUserEmail] = useState(()=>{ const s=getSession(); return s?s.email:""; });
  const [pendingEmail, setPendingEmail] = useState("");
  const [pendingNombre, setPendingNombre] = useState("");
  const [showAdmin, setShowAdmin] = useState(false);

  function handleLogin(email, nombre, mustChange) {
    if(mustChange) { setPendingEmail(email); setPendingNombre(nombre); setScreen("cambiar"); }
    else { setSession(email, nombre); setUsuario(nombre); setUserEmail(email); setScreen("app"); }
  }
  function handlePasswordChanged(nombre) { setUsuario(nombre); setScreen("app"); }
  function handleLogout() { clearSession(); setScreen("login"); setUsuario(""); setUserEmail(""); }

  if(screen==="login") return h(LoginScreen, {onLogin: handleLogin});
  if(screen==="cambiar") return h(CambiarPassword, {email:pendingEmail, nombre:pendingNombre, onDone:handlePasswordChanged});

  return h("div", {style:{minHeight:"100vh"}},
    showAdmin && h(PanelAdmin, {onClose:()=>setShowAdmin(false)}),
    h("div", {style:{position:"fixed",bottom:16,right:16,zIndex:999,
      background:"#141410",border:"1px solid #2d2a1e",borderRadius:8,
      padding:"8px 14px",display:"flex",alignItems:"center",gap:12,fontSize:11}},
      h("span", {style:{color:"#6b6452"}}, "👤 "+usuario),
      userEmail===ADMIN_EMAIL && h("button", {
        onClick:()=>setShowAdmin(true),
        style:{background:"#1e1e14",border:"1px solid #c9a84c44",color:"#c9a84c",
          borderRadius:5,padding:"3px 10px",cursor:"pointer",fontSize:10,fontWeight:600}
      }, "⚙ Usuarios"),
      h("button", {onClick:handleLogout,
        style:{background:"none",border:"1px solid #2d2a1e",color:"#4a4335",
          borderRadius:5,padding:"3px 10px",cursor:"pointer",fontSize:10,fontWeight:600}
      }, "Salir")
    ),
    h(AppPrincipal)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(AppConLogin));
