function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return String(h);} function getUsuarios(){const base={};for(const [email,u] of Object.entries(USUARIOS))base[email]={passHash:hashStr(u.pass),nombre:u.nombre,mustChange:u.mustChange};return base;} function getSession(){try{const s=JSON.parse(localStorage.getItem('dw_session')||'null');if(s&&s.exp>Date.now())return s;}catch(e){}return null;} function setSession(email,nombre){localStorage.setItem('dw_session',JSON.stringify({email,nombre,exp:Date.now()+8*3600*1000}));} function clearSession(){localStorage.removeItem('dw_session');}
function esc(v){return String(v??'—').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function badgeClass(s){s=(s||'').toLowerCase(); if(s.includes('vig')) return 'vigente'; if(s.includes('cerr')) return 'cerrado'; if(s.includes('anul')) return 'anulado'; if(s.includes('venc')) return 'vencido'; return '';}

function prettyCons(v){return '<span class="cons-chip"><span class="dot '+(consClass(v)==='dar'?'dar':consClass(v)==='bull'?'bull':'')+'"></span>'+esc(v||'-')+'</span>'}

function calcMovSummary(filas){const ingresos={total:0,categorias:{}}; const egresos={total:0,categorias:{}}; (filas||[]).forEach(f=>{const cantidad=Number(f.recibido)||Number(f.enviado)||0; const cat=f.categoria||'Sin categoria'; const t=String(f.tipo_movimiento||'').toLowerCase(); if(t.includes('entrada')){ingresos.total+=cantidad; ingresos.categorias[cat]=(ingresos.categorias[cat]||0)+cantidad;} else if(t.includes('salida')){egresos.total+=cantidad; egresos.categorias[cat]=(egresos.categorias[cat]||0)+cantidad;}}); return {ingresos,egresos};}

function renderRemates(){const rems=DATOS_REMATES.remates||[]; const host=document.createElement('div'); let selected=0,q='',tipo='todos',estado='todos',sortKey=null,sortDir='asc'; function draw(){const rem=rems[selected]||null; const cards=rems.map((r,i)=>{const dtes=new Set((r.filas||[]).map(f=>f.documento)).size; const cls='rem-card '+(i===selected?'active ':'')+(((r.info||{}).consignataria||'').toUpperCase().includes('BULLTRADE')?'rem-bulltrade':'rem-darwash'); return '<div class="'+cls+'" data-i="'+i+'"><div class="rem-title">'+esc(r.codigo||'Remate')+'</div><div class="small">'+esc((r.info||{})['Inicio']||'-')+' → '+esc((r.info||{})['Fin']||'-')+'</div><div class="rem-stats"><div><div class="rem-stat-num">'+esc(r.total_animales||0)+'</div><div class="small">ANIMALES</div></div><div><div class="rem-stat-num" style="color:var(--amber)">'+dtes+'</div><div class="small">DTES</div></div></div></div>';}).join(''); let detail=''; if(rem){ const tipos=['todos',...Array.from(new Set((rem.filas||[]).map(f=>f.tipo_movimiento).filter(Boolean)))]; const estados=['todos',...Array.from(new Set((rem.filas||[]).map(f=>f.estado).filter(Boolean)))]; let rows=(rem.filas||[]).filter(f=>(tipo==='todos'||f.tipo_movimiento===tipo)&&(estado==='todos'||f.estado===estado)); if(q){const qq=q.toLowerCase(); rows=rows.filter(f=>Object.values(f).some(v=>String(v||'').toLowerCase().includes(qq)));} if(sortKey){ rows=[...rows].sort((a,b)=>{const av=a[sortKey]??''; const bv=b[sortKey]??''; const anum=['enviado','recibido'].includes(sortKey)?(Number(av)||0):null; const bnum=['enviado','recibido'].includes(sortKey)?(Number(bv)||0):null; const cmp=anum!==null?(anum-bnum):String(av).localeCompare(String(bv)); return sortDir==='asc'?cmp:-cmp;}); } const sums=calcMovSummary(rows); const header='<div class="filters"><input class="input" id="r-q" placeholder="Buscar DTE, emisor, receptor..." value="'+esc(q)+'"><select class="select" id="r-tipo">'+tipos.map(v=>'<option '+(v===tipo?'selected':'')+' valu body+'</tbody></table></div>'; } else { detail='<div class="small">No hay remates cargados.</div>'; } host.innerHTML='<div class="wrap"><div class="small" style="margin-bottom:12px">EVENTOS REGISTRADOS</div><div class="rem-grid">'+cards+'</div>'+detail+'</div>'; host.querySelectorAll('.rem-card').forEach(el=>el.onclick=function(){selected=Number(el.dataset.i); draw();}); host.querySelectorAll('.dte-link').forEach(el=>el.onclick=function(){const d=(DATOS_DTES.dtes||[]).find(x=>String(x.nro_dte)===String(el.dataset.doc)); openDetalle(d);}); const rq=host.querySelector('#r-q'); if(rq) rq.oninput=e=>{q=e.target.value; draw();}; const rt=host.querySelector('#r-tipo'); if(rt) rt.onchange=e=>{tipo=e.target.value; draw();}; const re=host.querySelector('#r-est'); if(re) re.onchange=e=>{estado=e.target.value; draw();}; host.querySelectorAll('.sorter').forEach(th=>th.onclick=function(){const k=this.dataset.sort; if(sortKey===k){sortDir=sortDir==='asc'?'desc':'asc';} else {sortKey=k; sortDir='asc';} draw();}); }
 draw(); return host; }
function renderDtes(){const wrap=document.createElement('div'); let q='',cons='todas',est='todos'; function draw(){const all=DATOS_DTES.dtes||[]; let rows=all.filter(d=>(cons==='todas'||(d.consignataria||'')===cons)&&(est==='todos'||(d.estado||'')===est)); if(q){const s=q.toLowerCase(); rows=rows.filter(r=>Object.values(r).some(v=>String(v||'').toLowerCase().includes(s)));} const consOpts=['todas',...Array.from(new Set(all.map(x=>x.consignataria).filter(Boolean)))]; const estOpts=['todos',...Array.from(new Set(all.map(x=>x.estado).filter(Boolean)))]; const total=all.length,vig=all.filter(x=>/vigente/i.test(x.estado||'')).length,venc=all.filter(x=>/vencido/i.test(x.estado||'')).length,anu=all.filter(x=>/anulado/i.test(x.estado||'')).length; const rowsHtml=rows.map(d=>{const rc=consClass(d.consignataria)==='dar'?'row-darwash':consClass(d.consignataria)==='bull'?'row-bulltrade':''; return '<tr class="'+rc+'"><td class="nowrap col-consig">'+prettyCons(d.consignataria)+'</td><td class="link dte-open nowrap numcol col-dte" data-dte="'+esc(d.nro_dte)+'">'+esc(d.nro_dte)+'</td><td>'+esc(d.emisor_nombre)+'</td><td class="nowrap numcol col-cuit">'+esc(d.emisor_cuit)+'</td><td>'+esc(d.receptor_nombre)+'</td><td class="nowrap numcol col-cuit">'+esc(d.receptor_cuit)+'</td><td class="nowrap col-tipo">'+esc(d.tipo)+'</td><td class="nowrap col-estado"><span class="badge '+badgeClass(d.estado)+'">'+esc(d.estado)+'</span></td><td class="nowrap numcol col-fecha">'+esc(d.fecha_carga)+'</td><td class="nowrap numcol col-fecha">'+esc(d.fecha_vencimiento)+'</td><td class="nowrap"><button class="ghost-btn ver-btn" data-dte="'+esc(d.nro_dte)+'">Ver detalle</button></td></tr>';}).join(''); wrap.innerHTML='<div class="wrap"><div class="cards"><div class="card total"><div class="k">Total DTEs</div><div class="v">'+total+'</div></div><div class="card vig"><div class="k">Vigentes</div><div class="v">'+vig+'</div></div><div class="card ven"><div class="k">Vencidos</div><div class="v">'+venc+'</div></div><div class="card anu"><div class="k">Anulados</div><div class="v">'+anu+'</div></div></div><div class="filters"><input class="input" id="q" placeholder="Buscar por emisor, receptor, DTE, RENSPA..." value="'+esc(q)+'"><select class="select" id="cons">'+consOpts.map(v=>'<option '+(v===cons?'selected':'')+' value="'+esc(v)+'">'+(v==='todas'?'Todas las consignatarias':esc(v))+'</option>').join('')+'</select><select class="select" id="est">'+estOpts.map(v=>'<option '+(v===est?'selected':'')+' value="'+esc(v)+'">'+(v==='todos'?'Todos los estados':esc(v))+'</option>').join('')+'</select><span class="result-count">'+rows.length+' resultados</span></div><div class="table-wrap"><table><thead><tr><th class="nowrap col-consig">Consignataria</th><th class="nowrap col-dte">Nro. DTE</th><th>Emisor</th><th class="nowrap col-cuit">CUIT Emisor</th><th>Receptor</th><th class="nowrap col-cuit">CUIT Receptor</th><th class="nowrap col-tipo">Tipo</th><th class="nowrap col-estado">Estado</th><th class="nowrap col-fecha">Carga</th><th class="nowrap col-fecha">Vencimiento</th><th class="nowrap"></th></tr></thead><tbody>'+rowsHtml+'</tbody></table></div></div>'; wrap.querySelector('#q').oninput=e=>{q=e.target.value; draw();}; wrap.querySelector('#cons').onchange=e=>{cons=e.target.value; draw();}; wrap.querySelector('#est').onchange=e=>{est=e.target.value; draw();}; wrap.querySelectorAll('.ver-btn,.dte-open').forEach(el=>el.onclick=function(){const d=(DATOS_DTES.dtes||[]).find(x=>String(x.nro_dte)===String(el.dataset.dte)); openDetalle(d);}); }
