const USUARIOS = {};
const h = React.createElement;
const {useMemo,useState} = React;

function hashStr(s) { let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0; return String(h); }
function getUsuarios() {
  const base = {};
  for(const [email,u] of Object.entries(USUARIOS || {})) {
    base[email] = { passHash: hashStr(u.pass || ''), nombre: u.nombre || email, mustChange: !!u.mustChange };
  }
  try {
    const local = JSON.parse(localStorage.getItem('dw_pass_changes') || '{}');
    for(const [email,v] of Object.entries(local)) if(base[email]) base[email] = {...base[email], ...v};
  } catch(e) {}
  return base;
}
function savePassChange(email, passHash) {
  try {
    const local = JSON.parse(localStorage.getItem('dw_pass_changes') || '{}');
    local[email] = { passHash, mustChange: false };
    localStorage.setItem('dw_pass_changes', JSON.stringify(local));
  } catch(e) {}
}
function getSession() { try { const s = JSON.parse(localStorage.getItem('dw_session')||'null'); if(s && s.exp > Date.now()) return s; } catch(e) {} return null; }
function setSession(email,nombre) { localStorage.setItem('dw_session', JSON.stringify({email,nombre,exp:Date.now()+8*3600*1000})); }
function clearSession() { localStorage.removeItem('dw_session'); }

function estadoClass(v) {
  const t = (v || '').toLowerCase();
  if(t.includes('vigente')) return 'ok';
  if(t.includes('cerrado')) return 'neu';
  if(t.includes('anulado')) return 'bad';
  if(t.includes('venc')) return 'warn';
  return 'neu';
}

function Badge({value}) { return h('span', {className:'badge ' + estadoClass(value)}, value || '—'); }

function LoginScreen({onLogin}) {
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [error,setError]=useState('');
  const usuarios = getUsuarios();
  function go() {
    setError('');
    const u = usuarios[email.trim().toLowerCase()];
    if(!u) return setError('Email no registrado');
    if(u.passHash !== hashStr(pass)) return setError('Contraseña incorrecta');
    onLogin(email.trim().toLowerCase(), u.nombre, u.mustChange);
  }
  return h('div', {className:'login'},
    h('div', {className:'login-box'},
      h('div', {className:'brand'}, 'DARWASH'),
      h('div', {className:'sub', style:{marginBottom:'18px'}}, 'SIGSA / SENASA · DTEs'),
      h('div', {className:'small muted', style:{marginBottom:'8px'}}, 'Email'),
      h('input', {value:email,onChange:e=>setEmail(e.target.value),style:{width:'100%',marginBottom:'12px'},placeholder:'tu@email.com'}),
      h('div', {className:'small muted', style:{marginBottom:'8px'}}, 'Contraseña'),
      h('input', {type:'password',value:pass,onChange:e=>setPass(e.target.value),style:{width:'100%',marginBottom:'12px'},placeholder:'••••••'}),
      error ? h('div', {className:'small', style:{color:'#f87171',marginBottom:'10px'}}, error) : null,
      h('button', {onClick:go,style:{width:'100%'}}, 'Ingresar')
    )
  );
}

function ChangePass({email,nombre,onDone}) {
  const [a,setA]=useState('');
  const [b,setB]=useState('');
  const [err,setErr]=useState('');
  function save() {
    if(a.length < 6) return setErr('Mínimo 6 caracteres');
    if(a !== b) return setErr('No coinciden');
    savePassChange(email, hashStr(a));
    setSession(email,nombre);
    onDone(nombre);
  }
  return h('div', {className:'login'},
    h('div', {className:'login-box'},
      h('div', {className:'brand', style:{fontSize:'24px'}}, 'Primer ingreso'),
      h('div', {className:'small muted', style:{marginBottom:'16px'}}, 'Definí una contraseña nueva'),
      h('input', {type:'password',value:a,onChange:e=>setA(e.target.value),style:{width:'100%',marginBottom:'12px'},placeholder:'Nueva contraseña'}),
      h('input', {type:'password',value:b,onChange:e=>setB(e.target.value),style:{width:'100%',marginBottom:'12px'},placeholder:'Confirmar'}),
      err ? h('div', {className:'small', style:{color:'#f87171',marginBottom:'10px'}}, err) : null,
      h('button', {onClick:save,style:{width:'100%'}}, 'Guardar y continuar')
    )
  );
}

function Dashboard() {
  const rows = DATA.dtes || [];
  const [q,setQ]=useState('');
  const [estado,setEstado]=useState('TODOS');
  const [cons,setCons]=useState('TODAS');
  const [sortCol,setSortCol]=useState('fecha_carga');
  const [sortDir,setSortDir]=useState('desc');

  const estados = useMemo(() => ['TODOS', ...Array.from(new Set(rows.map(r => r.estado).filter(Boolean)))], [rows]);
  const consignatarias = useMemo(() => ['TODAS', ...Array.from(new Set(rows.map(r => r.consignataria).filter(Boolean)))], [rows]);

  const filtered = useMemo(() => {
    let out = [...rows];
    if(estado !== 'TODOS') out = out.filter(r => (r.estado || '') === estado);
    if(cons !== 'TODAS') out = out.filter(r => (r.consignataria || '') === cons);
    if(q) {
      const qq = q.toLowerCase();
      out = out.filter(r => Object.values(r).some(v => String(v || '').toLowerCase().includes(qq)));
    }
    const key = sortCol;
    const f = v => {
      const s = String(v || '');
      const p = s.split('/');
      if(p.length === 3) return p[2] + p[1] + p[0];
      return s;
    };
    out.sort((a,b) => sortDir === 'asc' ? f(a[key]).localeCompare(f(b[key])) : f(b[key]).localeCompare(f(a[key])));
    return out;
  }, [rows,q,estado,cons,sortCol,sortDir]);

  const stats = useMemo(() => {
    return {
      total: rows.length,
      vigentes: rows.filter(r => /vigente/i.test(r.estado || '')).length,

      anulados: rows.filter(r => /anulado/i.test(r.estado || '')).length,
    };
  }, [rows]);

  function sortBy(col) {

    ['consignataria','Consignataria'],
    ['nro_dte','Nro. DTE'],
    ['emisor_nombre','Emisor'],
    ['emisor_cuit','CUIT Emisor'],
    ['receptor_nombre','Receptor'],
    ['receptor_cuit','CUIT Receptor'],
    ['tipo','Tipo'],
    ['estado','Estado'],
    ['fecha_emision','Emisión'],
    ['fecha_carga','Carga'],
    ['fecha_vencimiento','Vencimiento'],
    ['fecha_arribo','Arribo'],
  ];

  return h(React.Fragment, null,
    h('header', null,
      h('div', null,
        h('div', {className:'brand'}, 'DARWASH'),
        h('div', {className:'sub'}, 'Tablero DTEs SIGSA / SENASA')
      ),
      h('div', {className:'small muted'},
        'Última actualización: ', DATA.fecha_extraccion ? new Date(DATA.fecha_extraccion).toLocaleString('es-AR') : '—'
      )
    ),
    h('div', {className:'wrap'},
      h('div', {className:'grid'},
        h('div', {className:'card'}, h('div', {className:'muted small'}, 'Total DTEs'), h('div', {className:'kpi'}, stats.total)),
        h('div', {className:'card'}, h('div', {className:'muted small'}, 'Vigentes'), h('div', {className:'kpi'}, stats.vigentes)),
        h('div', {className:'card'}, h('div', {className:'muted small'}, 'Cerrados'), h('div', {className:'kpi'}, stats.cerrados)),
        h('div', {className:'card'}, h('div', {className:'muted small'}, 'Anulados'), h('div', {className:'kpi'}, stats.anulados)),
      ),
      h('div', {className:'controls'},
        h('input', {placeholder:'Buscar...', value:q, onChange:e=>setQ(e.target.value), style:{minWidth:'260px'}}),
        h('select', {value:cons, onChange:e=>setCons(e.target.value)}, consignatarias.map(x => h('option', {key:x,value:x}, x))),
        h('select', {value:estado, onChange:e=>setEstado(e.target.value)}, estados.map(x => h('option', {key:x,value:x}, x))),
        h('div', {className:'small muted', style:{alignSelf:'center'}}, filtered.length + ' resultados')
      ),
      h('div', {className:'table-wrap'},
        h('table', null,
          h('thead', null,
            h('tr', null,
              cols.map(([key,label]) => h('th', {key, onClick:()=>sortBy(key)}, label, sortCol === key ? (sortDir === 'asc' ? ' ↑' : ' ↓') : ''))
            )
          ),
          h('tbody', null,
            filtered.map((r,i) => h('tr', {key:r.nro_dte || i},
              h('td', null, r.consignataria || '—'),
              h('td', null, r.nro_dte || '—'),
              h('td', null, r.emisor_nombre || '—'),
              h('td', null, r.emisor_cuit || '—'),
              h('td', null, r.receptor_nombre || '—'),
              h('td', null, r.receptor_cuit || '—'),
              h('td', null, r.tipo || '—'),
              h('td', null, h(Badge, {value:r.estado})),
              h('td', null, r.fecha_emision || '—'),
              h('td', null, r.fecha_carga || '—'),
              h('td', null, r.fecha_vencimiento || '—'),
              h('td', null, r.fecha_arribo || '—'),
            ))
          )
        )
      )
    )
  );
}

function Root() {
  const usuarios = Object.keys(USUARIOS || {}).length;
  const [screen,setScreen] = useState(() => usuarios ? (getSession() ? 'app' : 'login') : 'app');
  const [pendingEmail,setPendingEmail] = useState('');
  const [pendingNombre,setPendingNombre] = useState('');
  const [nombre,setNombre] = useState(() => { const s = getSession(); return s ? s.nombre : ''; });

  function onLogin(email,nombre,mustChange) {
    if(mustChange) { setPendingEmail(email); setPendingNombre(nombre); setScreen('change'); }
    else { setSession(email,nombre); setNombre(nombre); setScreen('app'); }
  }
  function onDone(nombre) { setNombre(nombre); setScreen('app'); }

  if(screen === 'login') return h(LoginScreen, {onLogin});
  if(screen === 'change') return h(ChangePass, {email:pendingEmail,nombre:pendingNombre,onDone});
  return h('div', null,
    usuarios ? h('div', {style:{position:'fixed',right:16,bottom:16,zIndex:999,background:'#141410',border:'1px solid #2d2a1e',padding:'8px 12px',borderRadius:'8px'}},
      h('span', {className:'small muted', style:{marginRight:'10px'}}, nombre || 'Usuario'),
      h('button', {className:'secondary', onClick:()=>{ clearSession(); location.reload(); }}, 'Salir')
    ) : null,
    h(Dashboard)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Root));
</script>
</body>
</html>
