<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Darwash · Ingresos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* Tokens — Darwash Operaciones (light) */
    :root{
      --bg:#FAFAF7;--surface:#FFFFFF;--surface-2:#F5F4EE;
      --border:#E5E5E0;--border-strong:#D4D2C8;
      --text:#1A1A1A;--text-2:#4A4A48;--muted:#8A8880;
      --cyan:#00B5B6;--cyan-soft:#E6F8F8;
      --green:#00A86B;--green-soft:#E6F7EF;
      --amber:#B8881F;--amber-soft:#FBF3DC;
      --red:#D63B47;--red-soft:#FCE8EA;
      --blue:#2E7AC7;--blue-soft:#E8F0FA;
      --serif:'Lora',Georgia,serif;
      --sans:'Inter',-apple-system,'Segoe UI',sans-serif;
      --mono:'JetBrains Mono',Consolas,Monaco,monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;overscroll-behavior:none;}

    /* HEADER */
    .lf-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
    .lf-logo{width:36px;height:36px;border-radius:8px;background:var(--cyan);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-weight:700;font-size:13px;letter-spacing:.5px;flex-shrink:0;}
    .lf-wordmark-wrap{display:flex;align-items:baseline;gap:6px;flex:1;min-width:0;}
    .lf-wordmark{font-family:var(--serif);font-weight:700;font-size:14px;letter-spacing:1.2px;color:var(--text);}
    .lf-wordmark-sub{font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
    .lf-badge{font-family:var(--mono);font-weight:600;font-size:10px;letter-spacing:1.5px;padding:4px 10px;border-radius:4px;border:1px solid;text-transform:uppercase;flex-shrink:0;}
    .lf-badge.entrada{color:var(--green);border-color:var(--green);background:var(--green-soft);}

    /* MAIN */
    .lf-main{padding:16px 16px 100px;max-width:520px;margin:0 auto;}

    /* SECTION LABEL con línea */
    .lf-section-label{font-family:var(--mono);font-weight:600;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin:24px 0 10px;display:flex;align-items:center;gap:8px;}
    .lf-section-label::after{content:"";flex:1;height:1px;background:var(--border);}
    .lf-section-label:first-of-type{margin-top:8px;}

    /* REMATE — Card con header fijo */
    .remate-bar{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:6px;overflow:hidden;}
    .remate-loading{padding:14px 18px;font-family:var(--sans);font-size:13px;color:var(--muted);text-align:center;}
    .remate-empty{padding:16px 20px;font-family:var(--sans);font-size:13px;color:var(--red);text-align:center;background:var(--red-soft);border:1px solid var(--red);border-radius:6px;font-weight:500;line-height:1.5;}
    .remate-single{padding:14px 16px;}
    .remate-single-tag{font-family:var(--mono);font-weight:600;font-size:9px;letter-spacing:1.5px;color:var(--cyan);text-transform:uppercase;margin-bottom:6px;}
    .remate-single-alias{font-family:var(--serif);font-weight:600;font-size:16px;color:var(--text);line-height:1.3;}
    .remate-single-code{font-family:var(--mono);font-weight:500;font-size:14px;letter-spacing:0.5px;color:var(--text);}
    .remate-single-sub{font-family:var(--mono);font-weight:400;font-size:11px;letter-spacing:0.5px;color:var(--muted);margin-top:3px;}
    .remate-single-meta{font-family:var(--sans);font-size:11px;color:var(--muted);margin-top:6px;}

    /* INPUT FIELD */
    .lf-field{margin-bottom:10px;}
    .lf-field-label{font-family:var(--mono);font-weight:500;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;display:block;}
    .lf-input,.lf-textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:11px 12px;color:var(--text);font-family:var(--sans);font-size:15px;outline:none;transition:border-color 150ms,background 150ms;-webkit-appearance:none;}
    .lf-input:focus,.lf-textarea:focus{border-color:var(--cyan);background:#FCFCFA;}
    .lf-input::placeholder,.lf-textarea::placeholder{color:var(--border-strong);}
    .lf-textarea{resize:none;min-height:80px;}
    .lf-input.uppercase{text-transform:uppercase;}

    /* ROW de 2 columnas */
    .lf-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
    .lf-row-2 .lf-field{margin-bottom:0;}

    /* HORA: caja interactiva con feel de input */
    .lf-hora-wrap{position:relative;}
    .hora-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:11px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color 150ms;}
    .hora-box:hover{border-color:var(--cyan);}
    .hora-val{font-family:var(--mono);font-weight:500;font-size:15px;color:var(--text);font-variant-numeric:tabular-nums;}
    .hora-edit{font-family:var(--mono);font-weight:500;font-size:9px;color:var(--cyan);letter-spacing:1.5px;text-transform:uppercase;}
    #hora-input-wrap{display:none;margin-top:6px;}
    #hora-input-wrap input{width:100%;background:var(--surface);border:1px solid var(--cyan);border-radius:6px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:15px;font-variant-numeric:tabular-nums;outline:none;}

    /* CATEGORIAS GRID 4x2 */
    .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
    .cat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 4px 6px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;transition:border-color 150ms,background 150ms;}
    .cat-card.active{border-color:var(--cyan);background:var(--cyan-soft);}
    .cat-code{font-family:var(--mono);font-weight:700;font-size:9px;letter-spacing:1.5px;color:var(--text-2);text-transform:uppercase;}
    .cat-card.active .cat-code{color:var(--cyan);}
    .cat-name{font-family:var(--sans);font-size:8px;color:var(--muted);}
    .cat-input{width:100%;background:transparent;border:none;border-radius:0;padding:2px 0 0;font-family:var(--mono);font-weight:600;font-size:20px;text-align:center;color:var(--text-2);outline:none;font-variant-numeric:tabular-nums;-webkit-appearance:none;-moz-appearance:textfield;appearance:textfield;}
    .cat-input::-webkit-outer-spin-button,.cat-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .cat-input::placeholder{color:var(--border-strong);}
    .cat-card.active .cat-input{color:var(--cyan);font-weight:700;}

    /* TOTAL CARD */
    .total-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
    .total-info{display:flex;flex-direction:column;}
    .total-label{font-family:var(--mono);font-weight:600;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
    .total-sub{font-family:var(--sans);font-size:11px;color:var(--muted);margin-top:2px;}
    .total-num{font-family:var(--mono);font-weight:700;font-size:34px;color:var(--green);font-variant-numeric:tabular-nums;line-height:1;}

    /* FIRMA */
    .firma-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
    .firma-canvas{display:block;width:100%;height:160px;cursor:crosshair;touch-action:none;background:repeating-linear-gradient(0deg,#FCFCFA 0,#FCFCFA 23px,#F0EFE9 23px,#F0EFE9 24px);}
    .firma-toolbar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface-2);border-top:1px solid var(--border);}
    .firma-status{font-family:var(--mono);font-weight:500;font-size:10px;color:var(--muted);letter-spacing:0.5px;}
    .btn-limpiar{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:4px;padding:5px 10px;font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;}

    /* FOTOS */
    .foto-previews{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
    .foto-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--surface);}
    .foto-thumb img{width:100%;height:100%;object-fit:cover;}
    .foto-thumb .foto-del{position:absolute;top:4px;right:4px;background:var(--red);border:none;border-radius:50%;width:22px;height:22px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .btn-add-foto{width:100%;background:var(--surface);border:1.5px dashed var(--border-strong);border-radius:6px;color:var(--cyan);font-family:var(--sans);font-size:14px;font-weight:500;padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-add-foto:active{border-color:var(--cyan);background:var(--cyan-soft);}
    .foto-counter{font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:0.5px;color:var(--muted);text-align:center;margin-top:6px;}

    /* BOTONES */
    .lf-btn{width:100%;border:1px solid transparent;border-radius:6px;padding:14px 16px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 150ms;}
    .lf-btn:active{opacity:0.85;}
    .lf-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-save{background:var(--cyan);color:#fff;border-color:var(--cyan);margin-top:24px;}
    .btn-pdf{background:transparent;border-color:var(--amber);color:var(--amber);}
    .btn-wsp{background:transparent;border-color:var(--green);color:var(--green);}
    .btn-nuevo{background:transparent;border-color:var(--blue);color:var(--blue);}

    /* SUCCESS OVERLAY */
    .success-overlay{display:none;position:fixed;inset:0;background:rgba(250,250,247,0.96);z-index:100;align-items:center;justify-content:center;padding:32px 24px;}
    .success-overlay.show{display:flex;}
    .success-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:32px 24px;text-align:center;max-width:380px;width:100%;}
    .success-icon{width:56px;height:56px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center;color:var(--green);font-size:28px;margin:0 auto 14px;}
    .success-title{font-family:var(--serif);font-weight:600;font-size:22px;color:var(--text);margin-bottom:6px;}
    .success-sub{font-family:var(--sans);font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5;white-space:pre-line;}
    .btn-group{display:flex;flex-direction:column;gap:8px;}

    /* HISTORIAL */
    .historial{margin-top:8px;display:flex;flex-direction:column;gap:8px;}
    .hist-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;}
    .hist-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
    .hist-hora{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--text);font-variant-numeric:tabular-nums;}
    .hist-total{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--green);font-variant-numeric:tabular-nums;}
    .hist-meta{font-family:var(--sans);font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
    .hist-cats{display:flex;flex-wrap:wrap;gap:4px;}
    .hist-cat{background:var(--cyan-soft);border:1px solid var(--cyan);border-radius:4px;padding:2px 8px;font-family:var(--mono);font-weight:500;font-size:10px;color:var(--cyan);letter-spacing:0.5px;}
    .hist-obs{font-family:var(--sans);font-size:11px;color:var(--text-2);margin-top:8px;font-style:italic;line-height:1.4;}
    .empty-hist,.loading{font-family:var(--sans);font-size:12px;color:var(--muted);text-align:center;padding:18px 0;}
  </style>
</head>
<body>
<!-- HEADER -->
<div class="lf-header">
  <div class="lf-logo">DRW</div>
  <div class="lf-wordmark-wrap">
    <span class="lf-wordmark">DARWASH</span>
    <span class="lf-wordmark-sub">INGRESOS</span>
  </div>
  <span class="lf-badge entrada">Entrada</span>
</div>

<!-- MAIN -->
<div class="lf-main">

  <!-- REMATE — header fijo desde URL (lo carga cargarRemate) -->
  <div class="remate-bar" id="remate-bar">
    <div class="remate-loading">Cargando remate…</div>
  </div>

  <!-- DATOS DEL INGRESO -->
  <div class="lf-section-label">Datos del ingreso</div>

  <div class="lf-row-2">
    <div class="lf-field">
      <label class="lf-field-label">Fecha</label>
      <input class="lf-input" id="inp-fecha" type="date"/>
    </div>
    <div class="lf-field">
      <label class="lf-field-label">Hora de descarga</label>
      <div class="lf-hora-wrap">
        <div class="hora-box" onclick="toggleHoraEdit()">
          <span class="hora-val" id="hora-display">--:--</span>
          <span class="hora-edit">Editar</span>
        </div>
        <div id="hora-input-wrap"><input type="time" id="hora-manual" oninput="onHoraManual(this.value)"/></div>
      </div>
    </div>
  </div>

  <div class="lf-field">
    <label class="lf-field-label">N° DTE / Guía</label>
    <input class="lf-input" id="nro-dte" type="text" placeholder="031246" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>

  <div class="lf-field">
    <label class="lf-field-label">Productor / Procedencia</label>
    <input class="lf-input" id="productor" type="text" placeholder="Nombre del productor o establecimiento" autocorrect="off"/>
  </div>

  <!-- TRANSPORTE -->
  <div class="lf-section-label">Transporte</div>

  <div class="lf-field">
    <label class="lf-field-label">Transportista</label>
    <input class="lf-input" id="transportista" type="text" placeholder="Nombre del transportista" autocorrect="off"/>
  </div>

  <div class="lf-field">
    <label class="lf-field-label">Patente camión</label>
    <input class="lf-input uppercase" id="patente" type="text" placeholder="AE874LP" autocomplete="off" autocorrect="off"/>
  </div>

  <!-- DETALLE POR CATEGORÍA -->
  <div class="lf-section-label">Detalle por categoría</div>
  <div class="cat-grid" id="cat-grid"></div>

  <!-- TOTAL -->
  <div class="total-card">
    <div class="total-info">
      <div class="total-label">Total cabezas</div>
      <div class="total-sub">Sumatoria de categorías</div>
    </div>
    <div class="total-num" id="total-display">0</div>
  </div>

  <!-- FIRMA -->
  <div class="lf-section-label">Firma del transportista</div>
  <div class="firma-wrap">
    <canvas id="firma-canvas" class="firma-canvas"></canvas>
    <div class="firma-toolbar">
      <span class="firma-status" id="firma-status">Firmá con el dedo</span>
      <button class="btn-limpiar" onclick="limpiarFirma()">Limpiar</button>
    </div>
  </div>

  <!-- FOTOS -->
  <div class="lf-section-label">Fotos de respaldo</div>
  <div class="foto-previews" id="foto-previews"></div>
  <button class="btn-add-foto" onclick="document.getElementById('foto-input').click()">📷 Agregar foto</button>
  <div class="foto-counter" id="foto-counter"></div>
  <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none" onchange="onFotoSeleccionada(this)"/>

  <!-- OBSERVACIONES -->
  <div class="lf-section-label">Observaciones</div>
  <div class="lf-field">
    <textarea class="lf-textarea" id="obs" placeholder="Estado de la hacienda, incidencias, observaciones del chofer…"></textarea>
  </div>

  <!-- GUARDAR -->
  <button class="lf-btn btn-save" id="btn-save" onclick="guardar()">Guardar ingreso</button>

  <!-- HISTORIAL -->
  <div class="lf-section-label">Registros del remate</div>
  <div class="historial" id="historial"><div class="loading">Cargando…</div></div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="success-overlay">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <div class="success-title">¡Ingreso registrado!</div>
    <div class="success-sub" id="success-sub"></div>
    <div class="btn-group">
      <button class="lf-btn btn-pdf" onclick="generarPDF()">Remito PDF</button>
      <button class="lf-btn btn-wsp" onclick="compartirWhatsApp()">Compartir por WhatsApp</button>
      <button class="lf-btn btn-nuevo" onclick="nuevoRegistro()">+ Nuevo ingreso</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://qkrrumlbvspbxjoxvxho.supabase.co';
const SB_KEY='sb_publishable_ZKjsxf9lkh4tgkhAayDvbA_6DOE7E6d';
const GH_USER='darwashsa-ux';
const GH_REPO='darwash-dte';
const CATS=['Novillo','Novillito','Vaquillona','Vaca','Ternero','Ternera','Toro','Torito/MEJ'];
const CAT_CODES={'Novillo':'NOV','Novillito':'NTO','Vaquillona':'VQ','Vaca':'VA','Ternero':'TER','Ternera':'TRA','Toro':'TORO','Torito/MEJ':'MEJ'};
let remateActual='',horaManual=null,ultimoRegistro=null,nroRemito=null;
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function sbInsert(tabla,data){
  const r=await fetch(`${SB_URL}/rest/v1/${tabla}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});
  if(r.ok){const d=await r.json();return Array.isArray(d)?d[0]:d;}
  return null;
}
async function sbSelect(tabla,filtros={}){
  let url=`${SB_URL}/rest/v1/${tabla}?order=ts.desc`;
  for(const[k,v]of Object.entries(filtros))url+=`&${k}=eq.${encodeURIComponent(v)}`;
  const r=await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}});
  return r.json();
}

function init(){renderCatGrid();iniciarReloj();cargarRemate();initFirma();initFotos();}

let firmaCanvas,firmaCtx,firmando=false,firmaVacia=true;

function initFirma(){
  firmaCanvas=document.getElementById('firma-canvas');
  // Set real pixel dimensions
  const rect=firmaCanvas.getBoundingClientRect();
  firmaCanvas.width=firmaCanvas.offsetWidth*window.devicePixelRatio||600;
  firmaCanvas.height=160*window.devicePixelRatio||160;
  firmaCtx=firmaCanvas.getContext('2d');
  firmaCtx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  firmaCtx.strokeStyle='#0a2a15';
  firmaCtx.lineWidth=2.5;
  firmaCtx.lineCap='round';
  firmaCtx.lineJoin='round';

  function getPos(e){
    const r=firmaCanvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left,y:src.clientY-r.top};
  }

  firmaCanvas.addEventListener('mousedown',e=>{firmando=true;const p=getPos(e);firmaCtx.beginPath();firmaCtx.moveTo(p.x,p.y);});
  firmaCanvas.addEventListener('mousemove',e=>{if(!firmando)return;const p=getPos(e);firmaCtx.lineTo(p.x,p.y);firmaCtx.stroke();firmaVacia=false;document.getElementById('firma-status').textContent='Firma registrada ✓';});
  firmaCanvas.addEventListener('mouseup',()=>firmando=false);
  firmaCanvas.addEventListener('mouseleave',()=>firmando=false);

  firmaCanvas.addEventListener('touchstart',e=>{e.preventDefault();firmando=true;const p=getPos(e);firmaCtx.beginPath();firmaCtx.moveTo(p.x,p.y);},{passive:false});
  firmaCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!firmando)return;const p=getPos(e);firmaCtx.lineTo(p.x,p.y);firmaCtx.stroke();firmaVacia=false;document.getElementById('firma-status').textContent='Firma registrada ✓';},{passive:false});
  firmaCanvas.addEventListener('touchend',()=>firmando=false);
}

let fotosData=[];

function initFotos(){renderFotoPreviews();}

function onFotoSeleccionada(input){
  if(!input.files||!input.files.length)return;
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{fotosData.push({dataUrl:e.target.result,file});renderFotoPreviews();};
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderFotoPreviews(){
  const c=document.getElementById('foto-previews');
  if(!c)return;
  c.innerHTML=fotosData.map((f,i)=>`<div class="foto-thumb"><img src="${f.dataUrl}"/><button class="foto-del" onclick="borrarFoto(${i})">✕</button></div>`).join('');
  const n=fotosData.length;
  document.getElementById('foto-counter').textContent=n===0?'':n+' foto'+(n>1?'s':'')+' adjunta'+(n>1?'s':'');
}

async function subirFotos(registroId){
  const urls={};
  console.log('[FOTOS] Subiendo',fotosData.length,'fotos para registro',registroId);
  for(let i=0;i<fotosData.length;i++){
    const{file}=fotosData[i];
    try{
      const ext=file.name.split('.').pop()||'jpg';
      const filename=`${registroId}_foto${i+1}.${ext}`;
      console.log('[FOTOS] Subiendo:',filename,'tipo:',file.type,'tamaño:',file.size);
      const r=await fetch(`${SB_URL}/storage/v1/object/remitos/${filename}`,{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type||'image/jpeg','x-upsert':'true'},
        body:file
      });
      const txt=await r.text();
      console.log('[FOTOS] Response',r.status,txt.slice(0,100));
      if(r.ok)urls[`foto${i+1}`]=`${SB_URL}/storage/v1/object/public/remitos/${filename}`;
    }catch(e){console.error('[FOTOS] Error foto',i,e);}
  }
  console.log('[FOTOS] URLs generadas:',urls);
  return urls;
}

async function cargarRemate(){
  const cont=document.getElementById('remate-bar');
  const btnSave=document.getElementById('btn-save');
  const showError=(msg)=>{
    cont.innerHTML='<div class="remate-empty">'+msg+'</div>';
    btnSave.disabled=true;
    remateActual='';
  };

  // 1. Leer ?remate=CODIGO de la URL
  const codigo=new URLSearchParams(location.search).get('remate');
  if(!codigo){
    showError('⚠ Link inválido. Pedí un link nuevo a Darwash.');
    return;
  }

  // 2. Fetch del maestro y los aliases en paralelo (alias es opcional)
  const baseUrl=`https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main`;
  const t=Date.now();
  let data, aliases={};
  try{
    const [rMaestro,rAlias]=await Promise.all([
      fetch(`${baseUrl}/remates_maestro.json?t=${t}`),
      fetch(`${baseUrl}/remates_alias.json?t=${t}`).catch(()=>null),
    ]);
    if(!rMaestro.ok) throw new Error('HTTP '+rMaestro.status);
    data=await rMaestro.json();
    if(rAlias && rAlias.ok){
      try{
        const a=await rAlias.json();
        if(a && typeof a==='object' && !Array.isArray(a)) aliases=a;
      }catch(_){ /* alias inválido — fallback {} silencioso */ }
    }
  }catch(e){
    showError('Sin conexión — no se pudo verificar el remate. Reintentá en un rato.');
    return;
  }

  // 3. Buscar el remate por código en el maestro
  const remate=(data.remates||[]).find(r=>r && r.codigo===codigo);
  if(!remate){
    showError('⚠ Remate no encontrado. Pedí un link nuevo.');
    return;
  }

  // 4. Validar estado — INGRESO solo permite PENDIENTE
  const estado=String((remate.info||{}).Estado||'').toUpperCase();
  if(estado==='CERRADA'){
    showError('⚠ Este remate ya cerró. Pedí un link nuevo a Darwash.');
    return;
  }
  if(estado!=='PENDIENTE'){
    showError('⚠ Estado del remate no válido para ingreso. Pedí un link nuevo.');
    return;
  }

  // 5. Render header fijo (no clickeable, sin posibilidad de cambiar)
  const info=remate.info||{};
  const alias=aliases[codigo];
  const titulo=alias
    ? '<div class="remate-single-alias">'+esc(alias)+'</div><div class="remate-single-sub">'+esc(codigo)+'</div>'
    : '<div class="remate-single-code">'+esc(codigo)+'</div>';
  cont.innerHTML=
    '<div class="remate-single">'+
      '<div class="remate-single-tag">Remate activo</div>'+
      titulo+
      '<div class="remate-single-meta">'+esc(info.Inicio||'')+' → '+esc(info.Fin||'')+' · '+esc(info['Predio ferial']||'')+'</div>'+
    '</div>';

  remateActual=codigo;
  btnSave.disabled=false;
  renderHistorial();
}

async function guardar(){
  const dte=document.getElementById('nro-dte').value.trim();
  const prod=document.getElementById('productor').value.trim();
  const trans=document.getElementById('transportista').value.trim();
  const pat=document.getElementById('patente').value.trim().toUpperCase();
  const obs=document.getElementById('obs').value.trim();
  const cats={};let total=0;
  document.querySelectorAll('#cat-grid input[data-cat]').forEach(i=>{const v=parseInt(i.value||0);if(v>0){cats[i.dataset.cat]=v;total+=v;}});
  if(!remateActual){alert('Seleccioná un remate');return;}
  if(total===0&&!dte){alert('Completá al menos el DTE o la cantidad de hacienda');return;}
  const now=new Date();
  const hora=horaManual||`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const fecha=`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Guardando...';
  const res=await sbInsert('ingresos_hacienda',{remate:remateActual,fecha,hora_descarga:hora,nro_dte:dte||null,productor:prod||null,transportista:trans||null,patente:pat||null,categorias:cats,total_cabezas:total,observaciones:obs||null});
  btn.disabled=false;btn.textContent='✓ Registrar Ingreso';
  if(res){
    ultimoRegistro={...res,fecha,hora_descarga:hora,nro_dte:dte,productor:prod,transportista:trans,patente:pat,categorias:cats,total_cabezas:total,observaciones:obs,remate:remateActual,firma:getFirmaDataURL()};
    nroRemito=res.id||Date.now();

    // Upload photos in background
    const nFotos=Object.keys(fotosData).length;
    if(nFotos>0&&res.id){
      btn.disabled=true;btn.textContent=`Subiendo ${nFotos} foto${nFotos>1?'s':''}...`;
      try{
        const fotoUrls=await subirFotos(res.id);
        if(Object.keys(fotoUrls).length>0){
          const patchFotos=await fetch(`${SB_URL}/rest/v1/ingresos_hacienda?id=eq.${res.id}`,{
            method:'PATCH',
            headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
            body:JSON.stringify({fotos:fotoUrls})
          });
          if(!patchFotos.ok){const err=await patchFotos.text();console.error('PATCH fotos error:',patchFotos.status,err);}
          else{console.log('✓ Fotos guardadas en tabla');}
          ultimoRegistro.fotos=fotoUrls;
        }
      }catch(e){console.error('Error subiendo fotos:',e);}
      btn.disabled=false;btn.textContent='✓ Registrar Ingreso';
    }

    document.getElementById('success-sub').textContent=`${fecha} a las ${hora}`+(total>0?`
${total} cabezas`:'')+(dte?`
DTE: ${dte}`:'')+(nFotos>0?`
${nFotos} foto${nFotos>1?'s':''} adjunta${nFotos>1?'s':''}` :'');
    document.getElementById('success-overlay').classList.add('show');
    renderHistorial();
    // Auto-generate and upload PDF silently
    setTimeout(async()=>{try{await generarPDF(true);}catch(e){console.error('Auto PDF:',e);}},600);
  }else{alert('Error al guardar. Verificá tu conexión.');}
}

async function subirPDFStorage(pdfBlob, filename){
  try{
    const url=`${SB_URL}/storage/v1/object/remitos/${filename}`;
    const r=await fetch(url,{
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':`Bearer ${SB_KEY}`,
        'Content-Type':'application/pdf',
        'x-upsert':'true'
      },
      body:pdfBlob
    });
    if(r.ok){
      // Return public URL
      return `${SB_URL}/storage/v1/object/public/remitos/${filename}`;
    }
    return null;
  }catch(e){
    console.error('Error subiendo PDF:',e);
    return null;
  }
}

    doc.roundedRect(M,y,tW,15,2,2,'FD');
    Cf(185,145,45); doc.roundedRect(M,y,3.5,15,1.5,1.5,'F');
    doc.setFont('helvetica','italic'); doc.setFontSize(8.5); Ct(80,60,10);
    const ls=doc.splitTextToSize(ultimoRegistro.observaciones,tW-14);
    doc.text(ls[0],M+8,y+9.5);
    y+=22;
  }

  // ── FIRMA ───────────────────────────────
  if(ultimoRegistro.firma){
    seccion('FIRMA DEL TRANSPORTISTA',54);
    Cf(232,240,236); doc.roundedRect(M+0.8,y+0.8,tW,24,2,2,'F');
    Cf(255,255,255); Cd(210,228,218); doc.setLineWidth(0.3);
    doc.roundedRect(M,y,tW,24,2,2,'FD');
    Cf(230,248,239); doc.roundedRect(M,y,16,24,1.5,0,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(5.5); Ct(30,110,90);
    doc.text('FIRMA',M+8,y+13,{align:'center'});
    try{ doc.addImage(ultimoRegistro.firma,'PNG',M+20,y+2,tW-36,20); }catch(e){}
    Cd(180,200,190); doc.setLineWidth(0.4);
    doc.line(M+20,y+22.5,W-M-16,y+22.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); Ct(150,180,165);
    doc.text(ultimoRegistro.transportista||'Transportista',W/2+2,y+26,{align:'center'});
    y+=31;
  }

  // ── FOTOS DE RESPALDO ──────────────────
  if(fotosData&&fotosData.length>0){
    seccion('FOTOS DE RESPALDO',42);

    const FOTO_W=54, FOTO_H=54, GAP=5;
    const COLS=3;
    const filaAltura=FOTO_H+GAP+8;

    // Si no entra la primera fila, nueva página
    if(y+filaAltura>H-28){ doc.addPage(); y=18; }

    let fx=M, fRow=0;
    fotosData.forEach(function(fd,idx){
      if(idx>0&&idx%COLS===0){
        y+=FOTO_H+GAP+8; fx=M; fRow++;
        if(y+FOTO_H>H-28){ doc.addPage(); y=18; }
      }
      // Marco de foto
      Cf(245,248,246); Cd(200,220,210); doc.setLineWidth(0.3);
      doc.roundedRect(fx,y,FOTO_W,FOTO_H,2,2,'FD');
      // Imagen
      try{
        doc.addImage(fd.dataUrl,'JPEG',fx+1,y+1,FOTO_W-2,FOTO_H-2);
      }catch(e){
        try{ doc.addImage(fd.dataUrl,'PNG',fx+1,y+1,FOTO_W-2,FOTO_H-2); }catch(e2){}
      }
      // Número de foto
      Cf(4,38,24); doc.roundedRect(fx+FOTO_W-12,y+FOTO_H-9,12,9,0,2,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(6); Ct(255,255,255);
      doc.text(String(idx+1)+'/'+(fotosData.length),fx+FOTO_W-6,y+FOTO_H-3.5,{align:'center'});
      fx+=FOTO_W+GAP;
    });
    y+=FOTO_H+10;
  }

  // ── FOOTER ──────────────────────────────
  const fy=H-20;
  Cf(185,145,45); doc.rect(0,fy-1.5,W,1.5,'F');
  Cf(4,38,24); doc.rect(0,fy,W,H-fy,'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(7); Ct(100,200,150);
  doc.text('DARWASH SA  ·  Vicuña Mackenna, Córdoba, Argentina',M,fy+8);
  doc.text('Generado: '+new Date().toLocaleString('es-AR'),W-M,fy+8,{align:'right'});
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); Ct(185,145,45);
  doc.text('Remito N° '+String(nroRemito).slice(-6).padStart(6,'0'),W/2,fy+8,{align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(6); Ct(70,130,95);
  doc.text('Documento interno — Darwash SA  ·  SIGSA / SENASA',W/2,fy+14,{align:'center'});

  const filename='Remito_Darwash_'+String(nroRemito).slice(-6).padStart(6,'0')+'.pdf';
  if(!soloSubir) doc.save(filename);

  try{
    const pdfBlob=doc.output('blob');
    const btn=document.querySelector('.btn-pdf');
    if(btn) btn.textContent='📤 Subiendo...';
    const pdfUrl=await subirPDFStorage(pdfBlob,filename);
    if(pdfUrl&&ultimoRegistro&&ultimoRegistro.id){
      await guardarURLenSupabase(ultimoRegistro.id,pdfUrl);
      ultimoRegistro.pdf_url=pdfUrl;
      if(btn) btn.textContent='✅ PDF guardado';
      setTimeout(()=>{if(btn) btn.textContent='📄 Descargar Remito PDF';},3000);
    }else{
      if(btn) btn.textContent='📄 Descargar Remito PDF';
    }
  }catch(e){
    console.error('Error subiendo PDF:',e);
    if(!soloSubir){const btn=document.querySelector('.btn-pdf');if(btn) btn.textContent='📄 Descargar Remito PDF';}
  }
}

function compartirWhatsApp(){
  if(!ultimoRegistro)return;
  const cats=Object.entries(ultimoRegistro.categorias||{}).filter(([,v])=>v>0).map(([k,v])=>`  • ${k}: ${v}`).join('\n');
  const msg=`🐄 *REMITO DE INGRESO — DARWASH SA*\n`
    +`━━━━━━━━━━━━━━━━━━\n`
    +`📅 ${ultimoRegistro.fecha}  🕐 ${ultimoRegistro.hora_descarga}\n`
    +`📋 Remate: ${ultimoRegistro.remate}\n`
    +(ultimoRegistro.nro_dte?`📄 DTE: ${ultimoRegistro.nro_dte}\n`:'')
    +(ultimoRegistro.productor?`👤 Productor: ${ultimoRegistro.productor}\n`:'')
    +(ultimoRegistro.transportista?`🚛 Transporte: ${ultimoRegistro.transportista}${ultimoRegistro.patente?' ('+ultimoRegistro.patente+')':''}\n`:'')
    +`━━━━━━━━━━━━━━━━━━\n`
    +`*HACIENDA:*\n${cats||'  Sin detalle'}\n`
    +`━━━━━━━━━━━━━━━━━━\n`
    +`*TOTAL: ${ultimoRegistro.total_cabezas} cabezas*\n`
    +(ultimoRegistro.observaciones?`\n💬 _${ultimoRegistro.observaciones}_`:'');
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}

function nuevoRegistro(){
  document.getElementById('success-overlay').classList.remove('show');
  ['nro-dte','productor','transportista','patente','obs'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('#cat-grid input').forEach(i=>i.value='');
  calcTotal();horaManual=null;ultimoRegistro=null;
  document.getElementById('hora-input-wrap').style.display='none';
  limpiarFirma();
  limpiarFotos();
}

async function renderHistorial(){
  const cont=document.getElementById('historial');
  if(!remateActual){cont.innerHTML='<div class="empty-hist">Seleccioná un remate</div>';return;}
  cont.innerHTML='<div class="loading">Cargando registros...</div>';
  try{
    const regs=await sbSelect('ingresos_hacienda',{remate:remateActual});
    if(!regs||regs.length===0){cont.innerHTML='<div class="empty-hist">Sin registros para este remate</div>';return;}
    cont.innerHTML=regs.map(r=>{
      const cats=Object.entries(r.categorias||{}).map(([k,v])=>`<span class="hist-cat">${k}: ${v}</span>`).join('');
      return `<div class="hist-item">
        <div class="hist-header">
          <div><div class="hist-hora">🕐 ${r.hora_descarga} — ${r.fecha}</div>
          <div class="hist-meta">${r.nro_dte?`📄 DTE: ${r.nro_dte}<br>`:''}${r.productor?`👤 ${r.productor}<br>`:''}${r.transportista?`🚛 ${r.transportista}${r.patente?' · '+r.patente:''}`:''}</div></div>
          <div class="hist-total">${r.total_cabezas} cab.</div>
        </div>
        ${cats?`<div class="hist-cats">${cats}</div>`:''}
        ${r.observaciones?`<div class="hist-obs">💬 ${r.observaciones}</div>`:''}
      </div>`;
    }).join('');
  }catch(e){cont.innerHTML='<div class="empty-hist">Error cargando registros</div>';}
}
